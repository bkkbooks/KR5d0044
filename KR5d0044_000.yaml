front:
  text: 素問入式運氣論奧序所七
  hash: sha256:bc523d328007dfe37d06f532db81c41db8190a3425f70f1ec0d8564474868f79
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0044_HFL_000-001a, image: hfl/0664/0664-044.png}
body:
  text: 朝散郎太醫學司業劉溫舒撰夫醫書者乃三墳之經伏羲觀天文造甲曆神農嘗百藥制本草黃帝論疾苦成素問因知其道奧妙不易窮研自非留心刻意豈達玄機且以其間氣運最為補瀉之要雖備見黃帝與岐伯鬼臾區問對分糅篇章卒無入法稍難施用余性識偏陋竊慕真風棲心聖典稍有歲月雖吏役塵勞之暇亦未嘗暫捨筆萃斯文久以盈軸莫不究源附説解惑分圖括上古運氣之祕文撮斯書隂陽之精論若網之在綱珠之在貫粲然明白箋明奧義咸有指歸詎飾文辭庶易曉晤使覽者經目頓知妙道幾過半矣詎敢沽譽且畏醫藥之差誤遺人夭殃絶人長命爾元符己卯歲丁丑月望日序素問入式運氣論奧目録卷上五運六氣樞要之圖六十年紀運圖論五行生死順逆論十干論十二支論納音論六化論四時氣候論交六氣時日論日刻論六氣標本論五行生成數卷中論五天之氣論五音建運論月建論天地六氣論主氣論客氣論天符論歲會論同天符同歲會論南北政卷下論太小氣運相臨同化論紀運論歲中五運論手足經論勝復論九宫分野論六十年客氣論六病論六脈論治法五行勝復論目録畢
  hash: sha256:20389393517b7c93cec8f425a8ce2de956350b05e36ef1da1a7558c6404ee2d3
