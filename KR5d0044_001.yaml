body:
  text: 五運六氣樞要之圖六十年紀運圖十干起運訣十二支司天訣論五行生死順逆之圖論五行生死順逆第一五行相生相剋其理昭然十干十二支五運六氣歲月日時皆自此立更相為用在天則為氣寒暑燥濕風在地則成形金木水火土形氣相感而化生萬物此造化生成之大紀也原其妙用可謂無窮矣木主於東應春木之為言觸也冒也陽氣觸動冒地而生也水流趨東以生木也木上發而覆下乃自然之質也火主於南應夏火之為言化也毁也陽在上隂在下毁然盛而變化萬物也鑽木作火木所生也然火無正體體本木焉出以應物盡而復入乃自然之理也金主於西應秋金之為言禁也隂氣始禁止萬物而揫斂披沙揀金土所生也生於土而别於土乃自然之形也水主於北應冬水之為言潤也隂氣濡潤任養萬物也水西而東金所生也水流曲折順下而達乃自然之性也土主於中央兼位西南應於長夏土之為言吐也含吐萬物將生者出將死者歸為萬物家故長於夏末火所生也土或勝水水乃反一自然之義也其相剋者子皆能為母復讎也木剋土土之子金反剋木木之子火反剋金金之子水反剋火火之子土反剋水水之子木反剋土也互能相生乃其始也互能相剋乃其終也皆出乎天之性也强可攻也土得木而達實可勝虛水得土而絶隂可消陽火得水而滅烈可敵剛金得火而缺堅可制柔木得金而伐故五者流行而更轉順則相生逆則相剋如是則各各為用以成其道而已十干之圖論十干第二天氣始於甲干地氣始於子支者乃聖人究乎隂陽重輕之用也著名以彰其德立號以表其事由是子甲相合然後成其紀遠可步於歲而統六十年近可推於日而明十二時歲運之盈虛氣令之早晏萬物生死將今驗古咸得而知之非特是也將考其細而知人未萌之禍福明其用而察病向往之死生則精微之義可謂大矣哉是以東方甲乙南方丙丁西方庚辛北方壬癸中央戊己五行之位也蓋甲乙其位木行春之令甲乃陽內而隂尚包之草木始甲而出也乙者陽過中然未得正方尚乙屈也又云乙軋也萬物皆解孚甲自抽軋而出之丙丁其位火行夏之令丙乃陽上而隂下隂內而陽外丁陽其强適能與隂氣相丁又云丙炳也萬物皆炳然著見而强也戊己其位土行周四季戊陽土也萬物生而出之萬物伐而入之己隂土也無所為而得己者也又云戊茂也己起也土行四季之末萬物舍秀者抑屈而起也庚辛其位金行秋之令庚乃隂干陽更而續者也辛乃陽在下隂在上隂干陽極於此庚更故也而辛新也庚辛皆金金味辛物成而後有味又云萬物肅然更茂實新成壬癸其位水行冬之令壬乃陽既受胎隂壬之乃陽生之位壬而為胎與子同意癸者揆也天令至此萬物閉藏懷妊於其下揆然萌芽天之道也以為日名焉故經曰天有十日日六竟而周甲者此也乃天地之數故甲丙戊庚壬為陽乙丁己辛癸為隂五行各一隂一陽故有十日十二支圖論十二支第三清陽為天五行彰而十干立濁隂為地八方定而十二支分運移氣遷歲歲而盈虛應紀上升下降物物而變化可期所以支干配合共臻妙用矣子者北方至隂寒水之位而一陽肇生之始故隂極則陽生壬而為胎子之為子此十一月之辰也至丑隂尚執而紐之又丑隂也助也謂十二月終始之際以結紐為名焉寅正月也陽已在上隂已在下人始見之時故律管飛灰以候之可以述事之始也又寅演也津也謂物之津塗卯者日升之時也又卯茂也言二月陽氣盛而孳茂辰者陽已過半三月之時物盡震而長又謂辰言震也巳者四月正陽而無隂也自子至巳陽之位陽於是當又巳起也物畢盡而超午者陽尚未屈隂始生而為主又云午長也大也物至五月皆滿長大矣未六月木已重而成矣又云未味也物成而有味與辛同意申者七月之辰申陽所為而已隂至於申則上下通而人始見白露葉落乃其候也可以述隂事以成之又云申身也言物體皆成酉者日入之時乃隂正中八月也又云酉輶也萬物皆輶縮收斂九月戌陽未既也然不用事潜藏於戌土中乃乾位戌為天門故也又云戌滅也萬物皆衰滅矣十月亥純隂也又亥劾也言隂氣劾殺萬物此地之道也故以此名月焉甲之干乃天之五行一隂一陽言之子之支以地方隅言之故子寅午申為陽卯巳酉亥為隂土居四維王在四季之末土有四辰戌為陽丑未為隂故其數不同也合而言之十配十二共成六十日復六六而成歲故經曰天以六六之節以成一歲此之謂也十二支亦曰十二律亦曰十二辰其辰有屬者乃位中所臨二十八宿之主星禽也故當其生與宿之禽同為所屬故也而星禽又有正副焉如尾火虎箕水豹皆在寅亢金龍角木蛟皆在辰虎龍為正餘皆此例火虎金龍者又以七曜紀之今所謂密日者乃七曜之名號以太陽直日則日密是隨日宿而言也二者雖於素問無所明亦隂陽之奧義故隨文略以舉之爾納音之圖論納音第四十干十二支相承共成六十日乃天地之紀符會以統日焉甲東方春始生為時之長子北方陽始生為氣之先則甲子為首而乙丑次之然辰之中交相參同則五行互以臨遇無一專致其統矣又有納音之法乃旋相為宫之法也正與律吕之用同而一辰之中又含五音十二辰共納六十音也謂如子之一辰甲子金丙子水戊子火庚子土壬子木是也按漢志同類娶妻隔八生子者此納音法也同類娶妻謂甲陽之干子陽之辰上下相臨皆陽則亢而無以兆其和故娶乙丑為妻乙丑干辰皆隂也餘位并同隔八生子謂甲子前八位下生壬申金又隔八生庚辰金三位然後左行向火至火依前隔八生火火三下生而後至木木三下生而後至水水三下生而後至土土三下生而後至金乃為一周復自甲午上生金依次而轉然隔八生子則除上下兩位而言也隔八非第八也若自甲子至癸酉通數之乃共十矣此周甲之氣耳納音之所以金先者則五行之中唯有金聲鑄而為器則音聲彰矣白虎通曰鍾兌音也感之於人則成肺亦為五藏先以主音聲外應皮毛堅而響亦由金之化也至秋肅殺萬物堅燥而風徑凄鳴乃金之性也反於自東右行向南五音始西而右行向南陽生於子所以下生隂生於午所以上生夫上下生者正謂天氣下降地氣上升易曰天地交泰義見此也然所生止三者亦三元之義故經曰三而成天三而成地三而成人易爻之象取三老子曰一生二二生三三生萬物即其意也蓋有始有中有終畢矣五音變而周乃十二辰各舍五音則成三十位而遍六十甲子也故經曰隂陽相錯變由生也又曰高下相召升降相因而變作矣此之謂也六化之圖論六化第五五行施形於地為世日用相生相制為萬物之宗元推而上之則其氣化百度何可量也是以感之於人則形體具而為神機之樞達之於天則寒暑運而為生化之原由是上聖造其微而內經作故論曰在地成形在天為氣也然行有五而氣有六以分君火相火之化六氣化者謂寒暑燥濕風火也乃天之元氣然後三隂三陽上奉之謂之標標本之論具在下文六氣皆有一化舉大概也尋文考之則土之化曰濕曰雨金之化曰燥曰清各所以明其性而已木之化風主於春春之為言蠢也陽氣蠢動故風所以鼓舞萬物為天號令君火之化熱主春末夏初行暄淑之令而不行炎暑應君之德也相火之化暑主於夏夏之為言大也與午同意炎暑乃行金之化清與燥主於秋秋之為言揫也與金同意清凉乃行白露清氣也金屬庚辛辛為丙婦帶火之氣故燥難經曰辛商也丙之柔則金燥之化可明矣久雨霖霪西風而晴燥之兆也西風而雨燥濕爭也而乃自晴水之化寒主於冬冬之為言終也嚴凛乃行土之化濕與雨主於長夏長夏謂六月也土生於火長在夏中既長而王土潤溽暑濕化行也蓋濕則土生乾則土死泉出地中濕化信矣經曰地氣上為雲天氣下為雨雨出地氣雲出天氣則土雨之化見矣同為一歲之令巡還而治之也夫四時寒暄之序加以六氣司化之令則歲歲各異凡春溫夏暑秋凉冬寒皆天地之正氣其客行於主位則自有逆順淫勝之異由是氣候不一豈可一定而論之隂陽四時之氣候則始於仲月而盛於季月故經曰差三十度而有奇又言氣令盛衰之用其在四維故陽之動始於溫而盛於暑隂之動始於清而盛於寒春夏秋冬各有差其分者此之謂也四維者辰戌丑未四季月也蓋春氣始於二月盛溫於三月夏氣始於五月盛暑於六月秋氣始於八月盛凉於九月冬氣始於十一月盛寒於十二月以此見之則氣差明矣然五月夏至隂氣生而反大熱十一月冬至陽氣生而反大寒者蓋氣自下生則推而上之也故隂生則陽上而愈熱陽生則隂上而愈寒以今驗之夏井清凉冬井溫和則可知也是所謂歲之常矣四時氣候之圖論四時氣候第六日月運行而四時成以其有常也故聖人立法以步之隂陽相錯而萬物生以其無窮也故聖人指物以候之其六氣終始早晏五運太少盈虛原之以至理考之以至數而垂示萬古無有差忒也經曰五日謂之候三候謂之氣六氣謂之時四時謂之歲又曰日為陽月為隂行有分紀周有道里日行一度月行十三度而有奇焉故大小月三百六十五日而成歲積氣餘而盈閏矣經云日常於晝夜行天之一度則一日也共三百六十五日四分之一而周天度乃成一歲常五日一候應之故三候成一氣即十五日也三氣成一節節謂立春春分立夏夏至立秋秋分立冬冬至此八節也三八二十四氣而分主四時一歲成矣春秋言分者以六氣言之則二月半初氣終而交二之氣八月半四氣盡而交五之氣若以四時之令言之則隂陽寒暄之氣到此可分之時也晝夜分五十刻亦隂陽之中分也故經曰分則氣異此之謂也冬夏言至者以六氣言之則五月半司天之氣至其所在十一月半在泉之氣至其所在以四時之令言之則隂陽至此極至之時也夏至日長不過六十刻陽至此而極冬至日短不過四十刻隂至此而極皆天候之未變故經曰至則氣同此之謂也天自西而東轉其日月五星循天從東而西轉故白虎通曰天左旋日月五星右行日月五星在天為隂故右行猶臣對君也日則晝夜行天之一度月則晝夜行天之十三度有奇者謂復行一度之中作十九分分之得七大率月行疾速終以二十七日月行一周天是將十三度及十九分之七數總之則二十九日計行天三百八十七度有奇計月行疾之數比日行遲之數則二十九日日方行天二十九度月已先行一周天三百六十五度外又行天之二十二度反少七度而不及日也隂陽家說謂日月之行自有前後遲速不等固無常準則有大小月盡之異也本三百六十五日四分度之一即二十五刻當為一歲自除歲外之餘則有三百六十日又除小月所少之日六日止有三百五十四日而成一歲通少十一日二十五刻乃盈閏為十二月之制則有立首之氣氣乃三候之至月半示斗建之方乃十二辰之方也閏月之紀則無立氣建方皆他氣但依曆以八節見之推其所餘乃成閏天度畢矣故經曰立端於始表正於中推餘於終而天度畢矣者此之謂也觀天之杳冥豈復有度乎乃日月行一日之處指二十八宿為證而記之曰度故經曰星辰者所以制日月之行也制謂制度也天亦無候以風雨霜露草木之類應期可驗而測之曰候言一候之日亦五運之氣相生而直之即五日也如環之無端周而復始書曰期三百六旬有六日以閏月定四時成歲即其義也醫工之流不可不知經曰不知年之所加氣之盛衰虛實之所超不可以為工矣王冰以謂天真氣運尚未該通人病之由安能精達即古聖之深戒也論交六氣時日圖論交六氣時日第七隂陽相遘分六位而寒暑㢮張日月推移運四時而氣令更變故經曰顯明之右君火之位顯明謂之日即卯位也君火之右退行一步相火治之復行一步土氣治之復行一步金氣治之復行一步水氣治之復行一步木氣治之者乃六氣之主位也自十二月中氣大寒日交木之初氣次至二月中氣春分日交君火之二氣次至四月中氣小滿日交相火之三氣次至六月中氣大暑日交土之四氣次至八月中氣秋分日交金之五氣次至十月中氣小雪日交水之六氣每氣各主六十日八十七刻半總之乃三百六十五日二十五刻共周一歲也若歲外之餘及小月之日則不及也但推之曆日依節令交氣此乃地之隂陽所謂靜而守位者也常為每歲之主氣寒暑燥濕風火者乃六氣之常紀氣應之不同者又有天之隂陽所謂動而不息自司天在泉左右四間是也輪行而居其上名之曰客氣客氣乃行歲中之天命天命所至則又有寒暑燥濕風火之化主氣則當祗奉客之天命客勝則從主勝則逆二者有勝而無復矣日刻之圖論日刻第八夫日一晝一夜十二時當均分於一日故上智設銅壼貯水漏下浮箭箭分百刻以度之雖日月晦明終不能逃是以一日之中有百刻之候也夫六氣通主一歲則一氣主六十日八十七刻半乃知交氣之時有早晏也故立此圖以明之立夏日有長短之異則晝夜互相推移而日出入時刻不同然則於百刻矣其氣交之刻則不能移也甲子之歲初之氣始於漏水下一刻終於八十七刻半子正之中也二之氣復始於八十七刻六分終於七十五刻戌正四刻也三之氣復始於七十六刻終於六十二刻半酉正之中也四之氣復始於六十二刻六分終於五十刻未正四刻也五之氣復始於五十一刻終於三十七刻半午正之中也六之氣復始於三十七刻六分終於二十五刻辰正四刻也此之謂一周天之歲度餘刻交入乙丑歲之初氣矣如此而轉至戊辰年初之氣矣復始於漏水下一刻則四歲而一小周也故申子辰氣會同者此也巳酉丑初之氣俱起於二十六刻寅午戌初之氣俱起於五十一刻亥卯未初之氣俱起於七十六刻氣皆起於同刻故謂之三合者義由此也以十五小周為一大周則六十年標本之圖論標本第九三隂三陽天之六氣標也水火木金土地之五行本也生長化收藏故陽中有隂隂中有陽動靜相召上下相臨隂陽相錯而變所由生也是道也非特徒然而書之各有至道至理存焉詳四問篇論交相而言標本則莫測其源太隂濕土少陽相火為標本同至於少隂君火太陽寒水則隂陽寒熱互相不同義從何來豈不知出於自然而非人意之所能名邪古今之論陽則順行又以進為盛自先太陽而後少陽也隂則逆行又以退為盛自先少隂而後太隂也此易爻卜筮之所同是以君火司於午午者一隂生之位火本熱而其氣當隂生之初故標本異而君火屬少隂也水居北方子而子者一陽生之位水本寒而其氣當陽生之初故標本異而寒水屬太陽也土者乃西南維未之位應於長夏之月未乃午之次故土曰太隂也相火者司於寅寅乃丑之次故相火曰少陽也木者位居東方震在人主於肝肝者隂未退干之而出雖陽藏居鬲下處隂之位木必待隂而後生故屬厥隂也金者居西方兌在人主肺肺為華蓋雖隂藏居鬲上處陽之位金必待陽而後發故屬陽明也然六氣之不同標本之義蓋由此生成數圖論生成數第十天高寥廓六氣回旋以成於四時地厚幽深五行生化以成於萬物可謂無窮而莫測者也聖人立法以推步者蓋不能逃其數觀其立數之因亦皆出乎自然故載於經典同而不異推以達其機窮以通其變皆不離於數內一曰水二曰火三曰木四曰金五曰土者咸有所也水北方子之位也子者陽生之初一陽數也故水曰一火南方午之位也午者隂生之初二隂數也故火曰二木居東方東陽也三者奇之數亦陽也故木曰三金居西方西隂也四者偶之數亦隂也故金曰四土應西南長夏五者奇之數亦陽也故土曰五由是論之則數以隂陽而配者也若考其深義則水生於一天地未分萬物未成之初莫不先見於水故靈樞經曰太一者水尊號先地之母後萬物之源以今驗之則草木子實未就人蟲胎卵胎胚皆水也豈不以水為一及其水之聚而形質化莫不備隂陽之氣在中而後成故物之小而味苦者火之兆也物熟則甘土之味也甘極則反淡淡本也然人禀父母隂陽生成之化故先生二腎左腎屬水右腎屬火火曰命門則火之因水而後見故火曰次二蓋草木子實大小雖異其中皆有兩以相合者與人腎同亦隂陽之兆是以萬物非隂陽合體則不能生化也既隂陽合體則然後有春生而秋成故次三曰木次四曰金蓋水有所屬火有所藏木有所發金有所别莫不皆因土而後成五也故次五曰土木居於東金居於西火居於南水居於北土居中央而寄位四維應令四季在人四支故金木水火皆待土而後成兼其土數五以成之則水六火七木八金九土常以五之生數不可至十者土不待十以成是生成之數皆五以合之則大衍之數由是以立則萬物豈能逃其數哉三隂三陽正化者從本生數對化者從標成數五運之紀則太過者其數成不及者其數生各取其數之生成多少以占政令氣化勝復之述作蓋明諸用也素問入式運氣論奧卷上
