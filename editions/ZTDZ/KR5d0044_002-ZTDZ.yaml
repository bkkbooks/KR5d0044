body:
  text: 五天氣圖論五天之氣第十一天地支干相錯而列於八方各有定位星宿環列垂象於其上而各有分野故太古占天望氣以書於册垂示後人在精意以考之而後可明也蓋天分五氣地列五行五氣分流散於其上經於列宿下合方隅則命之以爲五運丹天之氣經於牛女奎璧四宿之上下臨戊癸之位立爲火運黅天之氣經於心尾角軫四宿之上下臨甲巳之位立爲土運素天之氣經於亢氐昴畢四宿之上下臨乙庚之位立爲金運玄天之氣經於張翼婁胃四宿之上下臨丙辛之位立爲水運蒼天之氣經於危室柳鬼四宿之上下臨丁壬之位立爲木運此五氣所經二十八宿與十二分位相臨則灼然可見因此以紀五天而立五運也戌爲天門乾之位也巳爲地户巽之位也自房至畢十四宿爲陽主晝自昴至心十四宿爲隂主夜通一日也五音建運之圖論五音建運第十二五音者五行之音聲也土曰宫金曰商木曰角火曰徵水曰羽在陽年則曰太在隂年曰少晋書曰角觸也象諸陽氣觸動而生其位丁壬歲也徵止也言物盛則止其位戊癸歲也商强也謂金性之堅强其位乙庚歲也羽舒也陽氣將復萬物孳育而舒生其位丙辛歲也宫中也中和之道無往而不理又總堂室奥阼而謂之宫所圖不一蓋土亦以通貫於金木水火王於四季榮於四藏皆總之之意也其位甲己歲也故五運從十干起甲爲土也土生金故乙次之金生水故丙次之如此五行相生而轉甲爲陽乙爲隂亦相間而數如環之無端詳其五音五運之由莫不上下相召小大相乘同歸於治而已是故因刻以成日因日以成月因月以成歲遞相因以制用雖太古占天望氣定位之始見黅天之氣横於甲己爲土運素天之氣横於乙庚爲金運玄天之氣横於丙辛爲水運蒼天之氣横於丁壬爲木運丹天之氣横於戊癸爲火運則莫不有從焉若以月建之法論之則立運之因又可見也何哉丙者火之陽建於甲己歲之首正月建丙寅丙火生土故甲己爲土運戊者土之陽建於乙庚歲之首正月建戊寅戊土生金故乙庚爲金運庚者金之陽建於丙辛歲之首正月建庚寅庚金生水故丙辛爲水運甲者木之陽建於戊癸歲之首正月得甲寅甲木生火故戊癸爲火運壬者水之陽建於丁壬歲之首正月得壬寅壬水生木故丁壬爲木運是五運皆生於正月建干豈非日月歲時相因而制用哉月建圖論月建第十三夫十二支爲十二月則正月寅二月卯是也甲己之歲正月建丙寅乙庚之歲正月建戊寅丙辛之歲正月建庚寅丁壬之歲正月建壬寅戊癸之歲正月建甲寅乃用十干建於寅上觀其法甲子年爲首亦用六十甲子内初見者先建之次見者次建之故丙寅爲初戊寅爲次依先後循而轉之可見也前六十甲子納音圖中立位既終復轉於其上以終其紀者明矣建時貼用日干同法若五運隂年不及之歲大寒日交初氣其日時建干與年干合者謂之曰干德符當爲平氣非過與不及也略舉此以明其用而已論天地六氣第十四圖在主氣客氣文内經曰天地合氣六節分而萬物化生矣然地列五行者言其用也分支於十二自五行隂陽之氣以布八方蓋天氣降而下則地氣遷而上咸備五行之化氣然後合其用觀萬物未嘗不因天地之氣而化生之也地之氣靜而常天之氣動而變其六氣之源則同六氣之緒則異何哉蓋天之氣始於少隂而終於厥隂經曰少隂所謂標厥隂所謂終是也地之氣始於厥隂木而終於太陽水經曰顯明之右君火之位者其緒是也然不同之緒乃天眞坤元二氣相因而成焉故天之六元氣反合地十二支以五行正化對化爲其緒則少隂司子午太隂司丑未少陽司寅申陽明司卯酉太陽司辰戌厥隂司巳亥天氣始終之因如是而已地之六氣反合天之四時風熱暑濕燥寒爲其緒則厥隂風木主春少隂君火主春末夏初少陽相火主夏太隂濕土主長夏陽明燥金主秋太陽寒水主冬地氣終始之因如是而已經曰天有隂陽地亦有隂陽者乃上下相臨也天氣動而不息故五歲而冶遷應地氣靜而守位天氣不加於君火則五歲而餘一氣右遷相火之上以君火不立歲故也地之紀五歲一周天之紀六期一備五歲一周則五行之氣遍六期一備則六氣之位周與干加支之緒小同取隂陽相錯上下相乘畢其紀之之意也以五六相合故三十年一紀之則六十年也主氣之圖論主氣第十五地氣靜而守位則春温夏暑秋凉冬寒爲歲歲之常令四時爲六氣之所主也厥隂木爲初氣者方春氣之始也木生火故少隂君火少陽相火次之火生土故太隂土次之土生金故陽明金次之金生水故太陽水次之皆相生而布其令莫不咸有緒焉木爲初氣主春分前六十日有奇自斗建丑正至卯之中天度至此風氣乃行也君火爲二氣主春分後六十日有奇自斗建卯正至巳之中天度至此暄淑乃行也相火爲二氣主夏至前後各三十日有奇自斗建巳正至未之中天度至此炎熱乃行也土爲四氣主秋分前六十日有奇自斗建未正至酉之中天度至此雲雨乃行濕蒸乃作也金爲五氣主秋分後六十日有奇自斗建酉正至亥之中天度至此清氣乃行萬物皆燥也水爲六氣主冬至前後各三十日有奇自斗建亥正至丑之中天度至此寒氣乃行也六位旋相主氣以成一歲則天之六氣每歲轉居於其上以行天令者也其交日時前己具載矣客氣之圖論客氣第十六六氣分上下左右而行天令十二支分節令時日而司地化上下相召而寒暑燥濕風火與四時之氣不同者蓋相臨不一而使然也六氣司於十二支者有正對之化也然厥隂所以司於巳亥者何也謂厥隂木也木生於亥故正化於亥對化於巳也雖有卯爲正木之分乃陽明金對化也所以從生而順於巳也少隂所以司於子午者何也謂少隂爲君火尊位所以正得南方離位故正化於午對化於子也太隂所以司於丑未者何也謂太隂爲土土屬中宫寄於坤位西南居未分也故正化於未對化於丑也少陽所以司於寅申者何也謂少陽相火位卑於君火也雖有午位君火居之火生於寅故正化於寅對化於申也陽明所以司於卯酉者何也謂陽明爲金酉爲西方西方屬金故正化於酉對化於卯也太陽所以司於辰戌者何也謂太陽爲水雖有子位以居君火對化一本於此處云則居辰戌辰戌屬土故水雖土用孟子曰水由地中行斯可見矣水乃伏土中即六戊天門戌是也六巳地户辰是也故水雖上用正化於戌對化於辰也此玄珠之說已詳矣莫不各有因焉此天之隂陽合地之十二支動而不息者也但將年律起當年司天數至者爲司天相對一氣爲在泉餘氣爲左右間用在泉後一氣爲初之氣主六十日餘八十七刻半至司天爲三之氣主上半年自大寒日後通主上半年也至在泉爲六氣主下半年自大暑日後通主下半年也少隂子爲首順行又常爲太過司天太過不及亦間數則與十干起運圖上下相合也故經曰歲半已前天氣主之歲半已後地氣主之者此也天之六氣客也將此客氣布於地之六氣步位之上則有氣化之異矣經曰上下有位左右有紀者謂司天曰上位在南方則面北立左右乃左西右東也在泉曰下位在北方則面南立左右乃左東右西也故上下異而左右殊六微㫖論曰少陽之右陽明治之之緒者乃南面而立以閱氣之至也非論上下左右之位而與顯明之左右火治之之意同謂面南視之指位而言也天符之圖論天符第十七隂陽交遘上下臨御而後有淫勝鬱復之變此大法也司天者司之爲言直也主行天之令上之位也歲運者運之爲言動也主天地之間人物化生之氣中之位也在泉者主地之化行乎地中下之位也一歲之中有此上中下三氣各行化令而氣偶符會而同者則通其化雖無剋復之變則有中病徐暴之異是謂當年之中司天之氣與中氣運同者命曰天符符之爲言合也天符共十二年而十二年之中又有與當年十二律五行同者又是歲會命曰太一天符太一者所以尊之之號也謂一者天會二者歲會三者運會上有四年不論隂年陽年皆曰天符故經曰天符爲執法歲位爲行令太一天符爲貴人邪之中人則執法者其病連而危行病者其病徐而持貴人者其病暴而死蓋以氣令故中人則深矣歲會於律同而非天令則所以言行令者注曰象方伯無執法之權故無速害病但執持而已歲會之圖論歲會第十八夫當年十干建運與年辰十二律五行相會故曰歲會氣之主也則不以隂年陽年乃是取四時正中之月爲四直承歲子午卯酉是也而土無正位各寄王於四季之末一十八日有奇則通論承歲辰戌丑未是也已上共八年外有四年壬寅皆木庚申皆金是二陽年癸巳皆火辛亥皆水是二隂年亦是運與年辰相會而不爲歲會者謂不當四年正中之令故也除二陽年則癸巳辛亥二隂年雖不名歲會亦上下五行相佐皆爲平氣之歲物生脉應皆必合期無先後矣歲會八年中内四年與司天氣同已入太一天符也餘蓋見前論中同天符同歲會之圖論同天符同歲會第十九六氣循環互司天地太過不及隨於隂陽制而爲準上中下氣輪有符合天符歲會前已載之運氣與在泉合其氣化陽年曰同天符隂年曰同歲會故六十年中太一天符四年天符十二年歲會八年同天符六年同歲會六年五者離而言之共二十六年合而言之止有二十七年經言二十四歲者不言歲增也不可不審如是則通變行有多少病形有微甚生死有早受按經推步誠可知矣南北政圖論南北政第二十運用十干超則君火不當其運也六氣以君火爲尊五運以濕土爲尊故甲己土運爲南政蓋上以成數貫金木水火位居中央君尊南面而行令餘四運以臣事之面北而受令所以有别也而人脉應之甲己之歲二運南面論脉則寸在南而尺在北少隂司天兩寸不應少隂在泉兩尺不應乙丙丁戊庚辛壬癸之歲四運面北論脉則寸在北而尺在南少隂司天兩尺不應少隂在泉兩寸不應乃以南爲上北爲下正如男子面南受氣尺脉常弱女子面北受氣尺脉常盛之理同以其隂氣沉下故不應耳六氣之位則少隂在中而厥隂居右太隂居左此不可易也其少隂則主兩寸尺厥隂司天在泉當在右故右不應太隂司天在泉當在左故左不應依南政而論尺寸也若覆其手診之則隂沉於下反沉爲浮細爲大又經曰尺寸反者死隂陽交者死先立其年以知其氣左右應見然後乃可言死生之逆順者更在診以别其反詳其交而後造死生之微也素問入式運氣論奥卷中
