front:
  text: 素問入式運氣論奥序所七
  hash: sha256:8737ba9a3230f9df267af86e03a10cf070fda1043bbf75057779bd935b51a534
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0044_SJB_000-210485b, image: sjb/21/210485b.png}
body:
  text: 朝散郎太醫學司業劉温舒撰夫醫書者乃三墳之經伏羲觀天文造甲曆神農嘗百藥制本草黄帝論疾苦成素問因知其道奥妙不易窮研自非留心刻意豈達玄機且以其間氣運最爲補瀉之要雖備見黄帝與岐伯鬼臾區問對分糅篇章卒無入法稍難施用余性識偏陋竊慕眞風棲心聖典稍有歲月雖吏役塵勞之暇亦未嘗暫捨筆萃斯文乆以盈軸莫不究源附說解惑分圖括上古運氣之秘文撮斯書隂陽之精論若網之在綱珠之在貫粲然明白箋明奥義咸有指歸詎飾文辭庶易曉晤使覽者經目頓知妙道幾過半矣詎敢沽譽且畏醫藥之差誤遺人夭殃絶人長命爾元符己卯歲丁丑月望日序素問入式運氣論奥目録卷上五運六氣樞要之圖六十年紀運圖論五行生死順逆論十干論十二支論納音論六化論四時氣候論交六氣時日論日刻論六氣標本論五行生成數卷中論五天之氣論五音建運論月建論天地六氣論主氣論客氣論天符論歲會論同天符同歲會論南北政卷下論太小氣運相臨同化論紀運論歲中五運論手足經論勝復論九宫分野論六十年客氣論六病論六脉論治法五行勝復論目録畢
  hash: sha256:c46152878075ebc118a7f01b68667cece4c6f521f7366bcdb2b6cf7eeb89616c
